name: CI — Build & Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Make build ──────────────────────────────────────────────────────
  make-linux:
    name: Make — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lib
      - run: make test

  make-macos:
    name: Make — macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: make lib
      - run: make test

  # ── CMake build ─────────────────────────────────────────────────────
  cmake-linux:
    name: CMake — Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  cmake-macos:
    name: CMake — macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # ── Blackbox TCP conformance tests (TAP, Linux only) ───────────────
  blackbox-linux:
    name: Blackbox — TCP Conformance (TAP)
    runs-on: ubuntu-latest
    needs: cmake-linux           # reuse the already-validated build
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            python3-pip iproute2 socat

      - name: Install Python deps
        run: sudo pip3 install --break-system-packages -r tests/blackbox/requirements.txt

      - name: Build tcp_echo_demo
        run: |
          cmake -S . -B build
          cmake --build build --target tcp_echo_demo

      # Create a TAP pair: tap0 (SUT) ↔ tap1 (test harness)
      - name: Set up TAP interfaces
        run: |
          sudo ip tuntap add dev tap0 mode tap user $(whoami)
          sudo ip link set tap0 up
          sudo ip addr add 10.0.0.100/24 dev tap0
          # The phantom-IP trick: Scapy uses 10.0.0.100 as the source IP in
          # hand-crafted frames (via AF_PACKET), bypassing the kernel TCP stack.
          # However, the SUT's replies to 10.0.0.100 re-enter the kernel (via
          # the TAP device) and the kernel finds no socket → it sends RST back
          # through the TAP, aborting the SUT's connection.  Drop those RSTs.
          sudo iptables -A OUTPUT -p tcp --tcp-flags RST RST -j DROP

      - name: Start tcp_echo_demo in background
        run: |
          # The demo listens on TAP with IP 10.0.0.2, MAC 02:00:00:00:00:01
          sudo ./build/tcp_echo_demo tap0 10.0.0.2 &
          echo $! > /tmp/sut.pid
          sleep 1   # let the SUT initialize

      - name: Run TCP conformance suite
        run: |
          cd tests/blackbox
          sudo python3 -m pytest test_tcp_conform.py \
            --iface tap0            \
            --sut-ip  10.0.0.2      \
            --our-ip  10.0.0.100    \
            --sut-port 7            \
            -v --tb=short           \
            -p no:cacheprovider     \
            2>&1

      - name: Stop SUT
        if: always()
        run: |
          [ -f /tmp/sut.pid ] && sudo kill $(cat /tmp/sut.pid) || true

  # ── FetchContent integration test ───────────────────────────────────
  fetchcontent:
    name: FetchContent — Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure example consumer
        run: cmake -S examples/fetchcontent -B examples/fetchcontent/build
      - name: Build example consumer
        run: cmake --build examples/fetchcontent/build
      - name: Run example
        run: ./examples/fetchcontent/build/example_app
